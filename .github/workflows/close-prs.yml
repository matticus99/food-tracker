name: Close External PRs

on:
  pull_request_target:
    types: [opened]

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Close PR and comment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login;

            // Allow repo owner's PRs through
            const repoData = await github.rest.repos.get({ owner, repo });
            if (author === repoData.data.owner.login) {
              console.log(`PR #${prNumber} is from repo owner, skipping.`);
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: 'Thanks for your interest, but this project is not accepting external pull requests. This PR has been automatically closed.'
            });

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: prNumber,
              state: 'closed'
            });
