services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.docker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: server-deps
    env_file: .env.docker
    working_dir: /app/server
    command: npx drizzle-kit push
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      target: production
    restart: unless-stopped
    env_file: .env.docker
    environment:
      NODE_ENV: production
    depends_on:
      migrate:
        condition: service_completed_successfully

  nginx:
    build:
      context: .
      target: nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - api

volumes:
  pgdata:
